<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimodal Portfolio Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-toolbar" aria-label="Editor toolbar">
      <div class="toolbar-group">
        <button id="add-text-btn" type="button">Add Text</button>
        <button id="add-image-btn" type="button">Add Image</button>
        <input id="image-input" type="file" accept="image/*" hidden>
      </div>

      <div class="toolbar-group">
        <button id="bold-btn" type="button" title="Bold"><strong>B</strong></button>
        <button id="italic-btn" type="button" title="Italic"><em>I</em></button>
        <button id="underline-btn" type="button" title="Underline"><u>U</u></button>
        <label>
          Size
          <select id="font-size-select" aria-label="Font size">
            <option value="14">14</option>
            <option value="16" selected>16</option>
            <option value="20">20</option>
            <option value="24">24</option>
            <option value="32">32</option>
          </select>
        </label>
        <label>
          Text Color
          <input id="text-color-input" type="color" value="#111111" aria-label="Text color">
        </label>
      </div>

      <div class="toolbar-group">
        <label>
          Background
          <input id="background-color-input" type="color" value="#ffffff" aria-label="Slide background color">
        </label>
        <button id="delete-btn" type="button" disabled>Delete</button>
        <button id="save-btn" type="button">Save</button>
        <button id="export-btn" type="button">Export</button>
      </div>
    </header>

    <main class="editor-layout">
      <aside class="slide-panel" aria-label="Slides">
        <h2>Slides</h2>
        <div id="slide-list" class="slide-list"></div>
      </aside>

      <section class="canvas-stage" aria-label="Canvas stage">
        <div id="slide-canvas" class="slide-canvas"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
